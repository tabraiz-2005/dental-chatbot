<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bright Smile Dental — Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-container {
            width: 420px;
            height: 650px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .chat-header {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .clinic-avatar {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .clinic-info h2 {
            color: white;
            font-size: 16px;
            font-weight: 600;
        }

        .clinic-info p {
            color: rgba(255, 255, 255, 0.75);
            font-size: 12px;
            margin-top: 2px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }

        /* Messages area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            background: #f1f5f9;
            color: #1e293b;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }

        .message.user {
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 14px 16px;
            background: #f1f5f9;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            width: fit-content;
        }

        .typing span {
            width: 7px;
            height: 7px;
            background: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-6px);
            }
        }

        /* Quick reply buttons */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 20px 12px;
        }

        .quick-reply-btn {
            background: white;
            border: 1.5px solid #2563eb;
            color: #2563eb;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .quick-reply-btn:hover {
            background: #2563eb;
            color: white;
        }

        /* Input area */
        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }

        .chat-input-area input:focus {
            border-color: #2563eb;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: #2563eb;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: #1d4ed8;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }
    </style>
</head>

<body>

    <div class="chat-container">

        <!-- Header -->
        <div class="chat-header">
            <div class="clinic-avatar">🦷</div>
            <div class="clinic-info">
                <h2>Bright Smile Dental</h2>
                <p><span class="status-dot"></span>Online — typically replies instantly</p>
            </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                👋 Hi! I'm the virtual receptionist for Bright Smile Dental Clinic. How can I help you today?
            </div>
        </div>

        <!-- Quick reply suggestions -->
        <div class="quick-replies" id="quickReplies">
            <button class="quick-reply-btn" onclick="sendQuick('What are your opening hours?')">Opening hours</button>
            <button class="quick-reply-btn" onclick="sendQuick('Who are the doctors?')">Our doctors</button>
            <button class="quick-reply-btn" onclick="sendQuick('What services do you offer?')">Services</button>
            <button class="quick-reply-btn" onclick="sendQuick('How do I book an appointment?')">Book
                appointment</button>
        </div>

        <!-- Input -->
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type your question..."
                onkeydown="if(event.key==='Enter') sendMessage()" />
            <button class="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24">
                    <path d="M2 21l21-9L2 3v7l15 2-15 2v7z" />
                </svg>
            </button>
        </div>

    </div>

    <script>
        const CLINIC_ID = "clinic_abc";
        const API_URL = "/chat";

        function sendQuick(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            // Hide quick replies after first message
            document.getElementById('quickReplies').style.display = 'none';

            // Show user message
            addMessage(message, 'user');
            input.value = '';

            // Show typing indicator
            const typing = addTyping();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, clinic_id: CLINIC_ID })
                });

                const data = await response.json();
                typing.remove();
                addMessage(data.reply, 'bot');

            } catch (error) {
                typing.remove();
                addMessage("Sorry, I'm having trouble connecting. Please call us directly.", 'bot');
            }
        }

        function addMessage(text, sender) {
            const messages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            return div;
        }

        function addTyping() {
            const messages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'typing';
            div.innerHTML = '<span></span><span></span><span></span>';
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            return div;
        }
    </script>

</body>

</html>
