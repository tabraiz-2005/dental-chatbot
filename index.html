<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bright Smile Dental — Chat</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-container {
            width: 420px;
            height: 650px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .clinic-avatar {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .clinic-info h2 {
            color: white;
            font-size: 16px;
        }

        .clinic-info p {
            color: rgba(255, 255, 255, 0.75);
            font-size: 12px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
        }

        .message.bot {
            background: #f1f5f9;
            align-self: flex-start;
        }

        .message.user {
            background: #2563eb;
            color: white;
            align-self: flex-end;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 14px 16px;
            background: #f1f5f9;
            border-radius: 18px;
        }

        .typing span {
            width: 7px;
            height: 7px;
            background: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        @keyframes bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-6px);
            }
        }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #ccc;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="chat-container">

        <div class="chat-header">
            <div class="clinic-avatar">🦷</div>
            <div class="clinic-info">
                <h2>Bright Smile Dental</h2>
                <p>Online — instant replies</p>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                👋 Hi! I'm your AI dental receptionist. How can I help you?
            </div>
        </div>

        <div class="chat-input-area">
            <input id="userInput" placeholder="Type your question..."
                onkeydown="if(event.key==='Enter') sendMessage()" />
            <button onclick="sendMessage()">➤</button>
        </div>

    </div>

    <script>

        const API_URL = "https://dental-chatbot-u88a.onrender.com/chat";

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, "user");
            input.value = "";

            const typing = addTyping();

            try {
                console.log("Sending:", message);

                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: message
                    })
                });

                console.log("Status:", response.status);

                const data = await response.json();
                console.log("Response:", data);

                typing.remove();

                addMessage(data.reply || "No response from AI", "bot");

            } catch (error) {
                console.error("Error:", error);
                typing.remove();
                addMessage("⚠️ Connection error. Please try again.", "bot");
            }
        }

        function addMessage(text, sender) {
            const messages = document.getElementById("chatMessages");
            const div = document.createElement("div");
            div.className = "message " + sender;
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function addTyping() {
            const messages = document.getElementById("chatMessages");
            const div = document.createElement("div");
            div.className = "typing";
            div.innerHTML = "<span></span><span></span><span></span>";
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            return div;
        }

    </script>

</body>

</html>
